<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College/Institute Review Form</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Your existing CSS styles */
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header {
            background: linear-gradient(135deg, #1a237e, #283593);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 10px 10px;
        }
        /* ... include all your existing CSS ... */
    </style>
</head>
<body>
    {% csrf_token %}
    
    <div class="alert-container" id="alertContainer"></div>
    
    <div class="header text-center">
        <div class="container">
            <h1><i class="fas fa-star-half-alt me-2"></i>College/Institute Review</h1>
            <p class="lead">Share your experience to help others make informed decisions</p>
        </div>
    </div>

    <div class="container" style="width:50%;">
        <div class="form-container">
            <!-- Your existing form content -->
            <div class="user-info">
                <div class="d-flex align-items-center">
                    <i class="fas fa-user-circle fa-2x"></i>
                    <div>
                        <h5 class="mb-1" id="loggedInUserName">Loading...</h5>
                        <small class="text-muted">You are submitting a review as a logged-in user</small>
                    </div>
                </div>
            </div>
            
            <form id="reviewForm">
                {% csrf_token %}  <!-- ADD THIS LINE -->
    <!-- rest of your form -->
            </form>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Replace your current fetch call with this:
        fetch('/api/submit-review/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken(), // Add CSRF token
            },
            body: JSON.stringify(formData)
        })

        // Add this function to get CSRF token
        function getCSRFToken() {
            return document.querySelector('[name=csrfmiddlewaretoken]').value;
        }
    </script>
</body>
</html>
